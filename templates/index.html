<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Classifier</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --surface2:  #242424;
      --border:    #2e2e2e;
      --text:      #e8e8e8;
      --muted:     #787878;
      --accent:    #d4a853;
      --accent-dim:#3a2e14;
      --danger:    #c0392b;
      --bar1:      #d4a853;
      --bar2:      #a07830;
      --bar3:      #5c4520;
      --radius:    10px;
    }

    body {
      font-family: "Inter", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 56px 16px 80px;
    }

    /* ── Page header ── */
    header {
      width: 100%;
      max-width: 520px;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 5px;
    }

    /* ── Main panel ── */
    .panel {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── Drop zone ── */
    #drop-zone {
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    #drop-zone:hover  { background: var(--surface2); }
    #drop-zone.dragover {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    #drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon {
      width: 44px; height: 44px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.3rem; margin-bottom: 14px;
      background: var(--surface2);
    }
    #drop-zone strong {
      display: block; font-size: 0.9rem; font-weight: 500; color: var(--text);
    }
    #drop-zone span {
      font-size: 0.8rem; color: var(--muted); margin-top: 4px; display: block;
    }

    /* ── Footer row inside panel ── */
    .panel-footer {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .paste-hint {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }
    kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text);
    }

    /* ── Submit button ── */
    #submit-btn {
      padding: 8px 18px;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    #submit-btn:hover:not(:disabled) { opacity: 0.85; }
    #submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Preview ── */
    #preview-wrap {
      display: none;
      position: relative;
    }
    #preview {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid var(--border);
    }
    #clear-btn {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
      backdrop-filter: blur(4px);
      transition: background 0.15s;
    }
    #clear-btn:hover { background: rgba(192,57,43,0.7); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
    }

    /* ── Results ── */
    #results {
      display: none;
      padding: 24px 24px 20px;
    }

    .winner {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 22px;
    }
    .winner-name {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      text-transform: capitalize;
    }
    .winner-pct {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
    }

    .bars-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .bar-row { margin-bottom: 10px; }
    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      margin-bottom: 5px;
    }
    .bar-meta .name { text-transform: capitalize; }
    .bar-meta .pct  { color: var(--muted); }
    .bar-track {
      background: var(--surface2);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rank-1 .bar-fill { background: var(--bar1); }
    .rank-2 .bar-fill { background: var(--bar2); }
    .rank-3 .bar-fill { background: var(--bar3); }

    /* ── Error ── */
    #error-box {
      margin: 16px 20px;
      background: rgba(192,57,43,0.12);
      border: 1px solid rgba(192,57,43,0.3);
      border-radius: 7px;
      padding: 10px 14px;
      color: #e87c73;
      font-size: 0.83rem;
      display: none;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0f0f0f;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Image Classifier</h1>
  <p>CIFAR-10 · 90.26% test accuracy · 10 classes</p>
</header>

<div class="panel">

  <!-- Drop zone (hidden when preview is shown) -->
  <div id="drop-zone">
    <div class="upload-icon">↑</div>
    <strong>Drop an image or click to browse</strong>
    <span>JPG, PNG, WEBP, BMP &nbsp;·&nbsp; max 8 MB</span>
    <input type="file" id="file-input" accept="image/*" />
  </div>

  <!-- Preview (shown after image loaded) -->
  <div id="preview-wrap">
    <img id="preview" src="" alt="Preview" />
    <button id="clear-btn" onclick="clearImage()">✕ Clear</button>
  </div>

  <!-- Bottom bar -->
  <div class="panel-footer">
    <span class="paste-hint">Paste with <kbd>Ctrl</kbd>+<kbd>V</kbd></span>
    <button id="submit-btn" onclick="submitImage()" disabled>Classify</button>
  </div>

  <!-- Error -->
  <div id="error-box"></div>

  <!-- Results -->
  <div id="results">
    <div class="divider" style="margin: 0 -24px 20px;"></div>
    <div class="winner">
      <span class="winner-name" id="winner-name"></span>
      <span class="winner-pct"  id="winner-pct"></span>
    </div>
    <div class="bars-label">Top predictions</div>
    <div id="bars"></div>
  </div>

</div>

<script>
  let currentFile = null;
  let currentB64  = null;

  const dropZone    = document.getElementById("drop-zone");
  const fileInput   = document.getElementById("file-input");
  const previewWrap = document.getElementById("preview-wrap");
  const previewImg  = document.getElementById("preview");
  const submitBtn   = document.getElementById("submit-btn");
  const results     = document.getElementById("results");
  const errorBox    = document.getElementById("error-box");
  const bars        = document.getElementById("bars");

  // ── File input ──────────────────────────────────────────────────────────────
  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  // ── Drag and drop ───────────────────────────────────────────────────────────
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", ()  => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith("image/")) loadFile(f);
  });

  // ── Paste anywhere on page ──────────────────────────────────────────────────
  document.addEventListener("paste", e => {
    const item = [...e.clipboardData.items].find(i => i.type.startsWith("image/"));
    if (!item) return;
    loadFile(item.getAsFile());
  });

  function loadFile(file) {
    currentFile = file;
    currentB64  = null;
    const reader = new FileReader();
    reader.onload = ev => showPreview(ev.target.result);
    reader.readAsDataURL(file);
  }

  function showPreview(dataUrl) {
    previewImg.src = dataUrl;
    currentB64     = dataUrl;
    dropZone.style.display    = "none";
    previewWrap.style.display = "block";
    submitBtn.disabled        = false;
    results.style.display     = "none";
    hideError();
  }

  function clearImage() {
    currentFile = null;
    currentB64  = null;
    fileInput.value           = "";
    previewWrap.style.display = "none";
    dropZone.style.display    = "";
    submitBtn.disabled        = true;
    results.style.display     = "none";
    hideError();
  }

  // ── Submit ──────────────────────────────────────────────────────────────────
  async function submitImage() {
    submitBtn.disabled  = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Running…';
    hideError();
    results.style.display = "none";

    try {
      let response;
      if (currentFile) {
        const form = new FormData();
        form.append("file", currentFile);
        response = await fetch("/predict", { method: "POST", body: form });
      } else if (currentB64) {
        response = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image_b64: currentB64 })
        });
      }

      const data = await response.json();
      if (data.error) { showError(data.error); return; }
      showResults(data.predictions);

    } catch (err) {
      showError("Request failed: " + err.message);
    } finally {
      submitBtn.disabled  = false;
      submitBtn.innerHTML = "Classify";
    }
  }

  // ── Render results ──────────────────────────────────────────────────────────
  function showResults(predictions) {
    document.getElementById("winner-name").textContent = predictions[0].label;
    document.getElementById("winner-pct").textContent  = predictions[0].confidence + "% confidence";

    bars.innerHTML = "";
    predictions.forEach((p, i) => {
      bars.innerHTML += `
        <div class="bar-row rank-${i + 1}">
          <div class="bar-meta">
            <span class="name">${p.label}</span>
            <span class="pct">${p.confidence}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width: 0%"
                 data-width="${p.confidence}"></div>
          </div>
        </div>`;
    });

    results.style.display = "block";

    // Animate bars after paint
    requestAnimationFrame(() => {
      document.querySelectorAll(".bar-fill").forEach(el => {
        el.style.width = el.dataset.width + "%";
      });
    });
  }

  function showError(msg) {
    errorBox.textContent   = "Error: " + msg;
    errorBox.style.display = "block";
  }
  function hideError() {
    errorBox.style.display = "none";
  }
</script>
</body>
</html>
